context:
  version: "3.4.0"

package:
  name: libpninexus
  version: ${{ version }}

source:
  url: https://github.com/pni-libraries/libpninexus/archive/refs/tags/v${{ version }}.tar.gz
  sha256: a09993d8cdb5990c1709f6f0c08c7d823ddc1bf5f2802c4ff30811d5b7d02eb4

build:
  number: 0
  script:
    - if: win
      then:
        - set CL=/DH5_BUILT_AS_DYNAMIC_LIB=1 %CL%
        - cmake -B build -G Ninja  %CMAKE_ARGS%  -DHDF5_FIND_DEBUG=ON  -DHDF5_USE_STATIC_LIBRARIES=OFF -DPNINEXUS_CONAN=DISABLE
      else: cmake -B build  ${CMAKE_ARGS}  -DPNINEXUS_CONAN=DISABLE
    - cmake --build build  --target all
    - cmake --install build
    - if: win or linux
      then: cmake -E env CTEST_OUTPUT_ON_FAILURE=1  cmake --build build  --target check
    - if: osx and build_platform == target_platform
      then: cmake -E env CTEST_OUTPUT_ON_FAILURE=1  cmake --build build  --target check

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - ninja
    - doxygen
    - graphviz
    - ghostscript
    - sphinx
    - breathe
    - pygments
    - if: not win
      then:
        - make
        - cppunit
  host:
    - hdf5
    - h5cpp
    - libboost-devel
    - zlib
  run_exports:
    - ${{ pin_subpackage("libpninexus", upper_bound="x.x") }}

tests:
  - package_contents:
      include:
        - pni/nexus/file.hpp
        - pni/nexus/xml/create.hpp
        - pni/nexus/path/path.hpp
        - pni/parsers/parser.hpp
        - pni/parsers.hpp
      lib:
        - pninexus

about:
  homepage: https://github.com/pni-libraries/libpninexus
  license: GPL-2.0-only
  license_file: COPYING
  summary: C++ NeXus library
  description: |
    libpninexus is C++ library to create NeXus files.
    It provides NeXus tree-structure builder basedon XML (NXDL-like) input,
    NeXus path parsers and other algorithms to access NeXus files.
  documentation: https://pni-libraries.github.io/libpninexus
  repository: https://github.com/pni-libraries/libpninexus

extra:
  recipe-maintainers:
    - jkotan
    - yuelongyu
